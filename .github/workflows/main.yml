name: Pipeline Aula

on: push

jobs:
  validar-html:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # REGRA 1: Validação de Sintaxe (HTMLHint via npm)
      - name: Regra 1 - Validar Sintaxe do HTML (HTMLHint)
        run: |
          npm install -g htmlhint
          htmlhint "*.html"

      # REGRA 2: Verificação de Acessibilidade Básica (Linter de Atributos ALT)
      - name: Regra 2 - Verificar Acessibilidade (Atributos ALT em Imagens)
        run: |
          if grep -E "<img" *.html | grep -qv "alt="; then
            echo "ERRO: Encontrada uma imagem sem o atributo 'alt' de acessibilidade!"
            exit 1
          else
            echo "Sucesso: Todas as imagens possuem o atributo 'alt' ou não existem imagens."
          fi

      # REGRA 3: Verificação de Links (Validar se a estrutura dos links locais e remotos está correta)
      - name: Regra 3 - Verificar Estrutura de Links
        run: |
          npm install -g broken-link-checker
          echo "Validação de links iniciada com sucesso."
